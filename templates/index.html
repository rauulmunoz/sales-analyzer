<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales Analyzer</title>
    <link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel ="stylesheet">
</head>
<body class = "bg.light">
    <div class  = "container mt-5">
        <div class = "card p-4 shadow">
            <h1 class = "mb-3">Analizador de ventas</h1>
            <p class = "text-muted">Sube tu archivo Excel o CSV para generar tu informe automáticamente</p>

            <form action="/upload" method = "POST" enctype="multipart/form-data">
                <div class = "mb-3">
                    <label class="form-label">Selecciona tu archivo</label>
                    <input type="file" name = "archivo" accept = ".xlsx, .csv" class = "form-control">
                </div>
                <button type = "submit" class = "btn btn-primary">Analizar</button>
            </form>
        </div>
    </div>
</body>
