<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapeo de columnas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow">
            <h1 class="mb-3">🗂️ Asigna tus columnas</h1>
            <p class="text-muted">Indica qué representa cada columna de tu archivo</p>

            <form action="/analizar" method="POST">
                <input type="hidden" name="ruta" value="{{ ruta }}">

                {% for columna in columnas %}
                <div class="mb-3">
                    <label class="form-label">{{ columna }}</label>
                    <select name="{{ columna }}" class="form-select">
                        <option value="ignorar">Ignorar</option>
                        <option value="fecha">Fecha</option>
                        <option value="producto">Producto</option>
                        <option value="cantidad">Cantidad</option>
                        <option value="precio">Precio</option>
                    </select>
                </div>
                {% endfor %}

                <button type="submit" class="btn btn-primary">Generar informe</button>
            </form>
        </div>
    </div>
</body>
</html>
